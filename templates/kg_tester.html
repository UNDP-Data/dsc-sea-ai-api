<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KG Subgraph Tester</title>
    <style>
        :root {
            --bg: #080b10;
            --panel: #111821;
            --line: #233243;
            --text: #dbe7f3;
            --muted: #95a8bd;
            --accent: #1e88e5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 0%, #101824 0%, #080b10 42%);
        }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 14px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 14px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: #f6fbff;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        form {
            display: grid;
            grid-template-columns: 0.45fr 0.55fr 1.25fr 1.25fr 0.9fr auto;
            gap: 10px;
            align-items: end;
        }

        label {
            display: grid;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            color: var(--text);
            background: #0f1520;
        }

        button {
            border: 0;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .status {
            min-height: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .kg-tooltip {
            position: absolute;
            max-width: 320px;
            padding: 10px 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: rgba(9, 14, 22, 0.96);
            color: #dbe7f3;
            font-size: 12px;
            line-height: 1.35;
            pointer-events: none;
            opacity: 0;
            display: none;
            left: -9999px;
            top: -9999px;
            transition: opacity 90ms ease-out;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        .kg-tooltip .title {
            display: block;
            margin-bottom: 4px;
            font-weight: 700;
            color: #f8fbff;
        }

        .workspace {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 14px;
            min-height: 600px;
        }

        .graph {
            position: relative;
            padding: 0;
            overflow: hidden;
        }

        #graph-svg {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 600px;
            background: radial-gradient(circle at 40% 20%, #182236 0%, #0b111c 65%);
        }

        #raw-json {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.45;
            max-height: 600px;
            overflow: auto;
            color: #b8d0e7;
        }

        .legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            vertical-align: middle;
        }

        @media (max-width: 980px) {
            form {
                grid-template-columns: 1fr;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            #graph-svg,
            #raw-json {
                min-height: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="panel">
            <h1>Knowledge Graph Subgraph Tester</h1>
            <p class="subtitle">
                Test V1 and V2 graph generation, inspect payloads, and visualize branches with D3.
            </p>
            <div class="legend">
                <span><span class="dot" style="background:#E5E7EB"></span>Central (largest)</span>
                <span><span class="dot" style="background:#2563EB"></span>Secondary</span>
                <span><span class="dot" style="background:#1D4ED8"></span>Periphery (small, hover labels only)</span>
            </div>
        </section>

        <section class="panel">
            <form id="graph-form">
                <label>
                    Target
                    <select id="target" name="target">
                        <option value="local" selected>Local server</option>
                        <option value="remote">Remote API</option>
                    </select>
                </label>
                <label>
                    Endpoint
                    <select id="version" name="version">
                        <option value="v2" selected>/graph/v2</option>
                        <option value="v1">/graph</option>
                    </select>
                </label>
                <label id="remote-base-label" style="display:none;">
                    Remote API Base URL
                    <input id="remote-base" name="remote-base" type="url" placeholder="https://your-api-host">
                </label>
                <label>
                    Query
                    <input id="query" name="query" type="text" required minlength="2" value="climate change mitigation">
                </label>
                <label>
                    X-Api-Key
                    <input id="api-key" name="api-key" type="password" required placeholder="From API_KEY env var">
                </label>
                <button id="run-btn" type="submit">Run</button>
            </form>
            <p id="status" class="status">Ready.</p>
        </section>

        <section class="workspace">
            <div class="panel graph">
                <svg id="graph-svg" aria-label="Knowledge graph visualization"></svg>
            </div>
            <div class="panel">
                <h3 style="margin-top: 0;">Raw Response</h3>
                <pre id="raw-json">{}</pre>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
        const defaultRemoteApiBase = {{ remote_api_base_url | tojson }};
        const form = document.getElementById("graph-form");
        const targetSelect = document.getElementById("target");
        const versionSelect = document.getElementById("version");
        const remoteBaseLabel = document.getElementById("remote-base-label");
        const remoteBaseInput = document.getElementById("remote-base");
        const queryInput = document.getElementById("query");
        const apiKeyInput = document.getElementById("api-key");
        const runBtn = document.getElementById("run-btn");
        const statusEl = document.getElementById("status");
        const rawJsonEl = document.getElementById("raw-json");
        const svg = d3.select("#graph-svg");
        const graphPanel = document.querySelector(".panel.graph");
        const tooltip = document.createElement("div");
        tooltip.className = "kg-tooltip";
        graphPanel.appendChild(tooltip);
        let tooltipHideTimer = null;
        let tooltipPinned = false;
        if (defaultRemoteApiBase) {
            remoteBaseInput.value = defaultRemoteApiBase;
        }

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.style.color = isError ? "#f87171" : "#95a8bd";
        }

        function clearGraph() {
            svg.selectAll("*").remove();
            tooltipPinned = false;
            if (tooltipHideTimer) {
                clearTimeout(tooltipHideTimer);
                tooltipHideTimer = null;
            }
            tooltip.style.opacity = "0";
            tooltip.style.display = "none";
            tooltip.style.left = "-9999px";
            tooltip.style.top = "-9999px";
        }

        function getNodeColor(node) {
            return node.colour || "#6B7280";
        }

        function getNodeRadius(node) {
            if (node.tier === "central") return 15;
            if (node.tier === "secondary") return 8;
            if (node.tier === "periphery") return 4;
            const w = Number(node.weight) || 0;
            const base = 7 + Math.min(w * 2, 8);
            return node.neighbourhood === 0 ? base + 2 : base;
        }

        function shouldShowLabel(node) {
            return node.tier !== "periphery";
        }

        function edgeWidth(weight) {
            const w = Number(weight) || 0;
            return Math.max(1, Math.min(4, 1 + w));
        }

        function normaliseBaseUrl(url) {
            return (url || "").trim().replace(/\/+$/, "");
        }

        function updateTargetUI() {
            const isRemote = targetSelect.value === "remote";
            remoteBaseLabel.style.display = isRemote ? "grid" : "none";
        }

        function renderGraph(graph) {
            clearGraph();
            const bounds = document.getElementById("graph-svg").getBoundingClientRect();
            const width = Math.max(320, bounds.width);
            const height = Math.max(420, bounds.height);

            const nodes = (graph.nodes || []).map((node) => ({
                ...node,
                id: node.name
            }));

            const links = (graph.edges || []).map((edge, index) => ({
                ...edge,
                source: edge.subject,
                target: edge.object,
                gid: `edge-grad-${index}`
            }));

            if (!nodes.length) {
                setStatus("No nodes returned for this query.");
                return;
            }

            svg.attr("viewBox", [0, 0, width, height]);
            const defs = svg.append("defs");
            const root = svg.append("g");
            svg.call(
                d3.zoom()
                    .scaleExtent([0.25, 4])
                    .on("zoom", (event) => root.attr("transform", event.transform))
            );

            const nodeById = new Map(nodes.map((node) => [node.id, node]));
            const colorForRef = (ref) => {
                const id = typeof ref === "object" ? ref.id : ref;
                const node = nodeById.get(id);
                return node ? getNodeColor(node) : "#6B7280";
            };

            const gradients = defs.selectAll("linearGradient")
                .data(links)
                .join("linearGradient")
                .attr("id", (d) => d.gid)
                .attr("gradientUnits", "userSpaceOnUse");

            gradients.each(function(d) {
                const gradient = d3.select(this);
                gradient.selectAll("stop").remove();
                gradient.append("stop")
                    .attr("offset", "0%")
                    .attr("stop-color", colorForRef(d.source));
                gradient.append("stop")
                    .attr("offset", "100%")
                    .attr("stop-color", colorForRef(d.target));
            });

            const link = root.append("g")
                .attr("stroke-opacity", 0.88)
                .selectAll("line")
                .data(links)
                .join("line")
                .attr("stroke", (d) => `url(#${d.gid})`)
                .attr("stroke-width", (d) => edgeWidth(d.weight));

            const nodeGroup = root.append("g")
                .selectAll("g")
                .data(nodes)
                .join("g")
                .call(
                    d3.drag()
                        .on("start", (event, d) => {
                            if (!event.active) simulation.alphaTarget(0.3).restart();
                            d.fx = d.x;
                            d.fy = d.y;
                        })
                        .on("drag", (event, d) => {
                            d.fx = event.x;
                            d.fy = event.y;
                        })
                        .on("end", (event, d) => {
                            if (!event.active) simulation.alphaTarget(0);
                            d.fx = null;
                            d.fy = null;
                        })
                );

            function escapeHtml(value) {
                return String(value).replace(/[&<>]/g, (ch) => (
                    ch === "&" ? "&amp;" : (ch === "<" ? "&lt;" : "&gt;")
                ));
            }

            function setTooltipContent(node) {
                const title = escapeHtml(node.name || "Unknown node");
                const description = escapeHtml(node.description || "No description available.");
                tooltip.innerHTML = `<span class="title">${title}</span><span>${description}</span>`;
            }

            function moveTooltip(event) {
                const [x, y] = d3.pointer(event, graphPanel);
                tooltip.style.left = `${Math.max(8, x + 14)}px`;
                tooltip.style.top = `${Math.max(8, y + 12)}px`;
            }

            function showTooltip(event, node) {
                if (tooltipHideTimer) {
                    clearTimeout(tooltipHideTimer);
                    tooltipHideTimer = null;
                }
                setTooltipContent(node);
                moveTooltip(event);
                tooltip.style.display = "block";
                tooltip.style.opacity = "1";
            }

            function hideTooltip(immediate = false) {
                if (tooltipPinned && !immediate) {
                    return;
                }
                const hide = () => {
                    if (tooltipPinned && !immediate) {
                        return;
                    }
                    tooltip.style.opacity = "0";
                    tooltip.style.display = "none";
                    tooltip.style.left = "-9999px";
                    tooltip.style.top = "-9999px";
                };
                if (immediate) {
                    hide();
                    return;
                }
                if (tooltipHideTimer) {
                    clearTimeout(tooltipHideTimer);
                }
                tooltipHideTimer = setTimeout(() => {
                    tooltipHideTimer = null;
                    hide();
                }, 140);
            }

            const nodeCircle = nodeGroup.append("circle")
                .attr("r", (d) => getNodeRadius(d))
                .attr("fill", (d) => getNodeColor(d))
                .attr("stroke", "#dbe7f3")
                .attr("stroke-width", (d) => (d.tier === "central" ? 1.2 : 0.6));

            nodeCircle
                .on("mouseover", (event, d) => {
                    showTooltip(event, d);
                })
                .on("mousemove", (event) => moveTooltip(event))
                .on("mouseout", (event, d) => {
                    hideTooltip();
                })
                .on("click", (event, d) => {
                    tooltipPinned = true;
                    showTooltip(event, d);
                    setTimeout(() => {
                        tooltipPinned = false;
                        hideTooltip();
                    }, 1800);
                });

            const nodeLabel = nodeGroup.filter((d) => shouldShowLabel(d))
                .append("text")
                .text((d) => d.name)
                .attr("x", (d) => getNodeRadius(d) + 4)
                .attr("y", 4)
                .attr("font-size", (d) => (d.tier === "central" ? 12.5 : 11))
                .attr("fill", "#f3f8ff");

            nodeLabel
                .on("mouseover", (event, d) => {
                    showTooltip(event, d);
                })
                .on("mousemove", (event) => moveTooltip(event))
                .on("mouseout", (event, d) => {
                    hideTooltip();
                })
                .on("click", (event, d) => {
                    tooltipPinned = true;
                    showTooltip(event, d);
                    setTimeout(() => {
                        tooltipPinned = false;
                        hideTooltip();
                    }, 1800);
                });

            const simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id((d) => d.id).distance(90).strength(0.24))
                .force("charge", d3.forceManyBody().strength(-210))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius((d) => getNodeRadius(d) + 22));

            simulation.on("tick", () => {
                gradients
                    .attr("x1", (d) => d.source.x)
                    .attr("y1", (d) => d.source.y)
                    .attr("x2", (d) => d.target.x)
                    .attr("y2", (d) => d.target.y);

                link
                    .attr("x1", (d) => d.source.x)
                    .attr("y1", (d) => d.source.y)
                    .attr("x2", (d) => d.target.x)
                    .attr("y2", (d) => d.target.y);

                nodeGroup.attr("transform", (d) => `translate(${d.x},${d.y})`);
            });
        }

        function logTimingHeaders(response, query, version) {
            const timingHeader = response.headers.get("X-KG-Timing");
            const serverTiming = response.headers.get("Server-Timing");
            if (timingHeader) {
                try {
                    const timings = JSON.parse(timingHeader);
                    console.log(`[KG timing] ${version} query="${query}"`, timings);
                } catch (_error) {
                    console.log("[KG timing] invalid X-KG-Timing header", timingHeader);
                }
            }
            if (serverTiming) {
                console.log(`[KG server-timing] ${serverTiming}`);
            }
        }

        async function loadGraph(event) {
            event.preventDefault();
            const target = targetSelect.value;
            const version = versionSelect.value;
            const remoteBase = normaliseBaseUrl(remoteBaseInput.value);
            const query = queryInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!query || !apiKey) {
                setStatus("Query and X-Api-Key are required.", true);
                return;
            }
            if (target === "remote" && !remoteBase) {
                setStatus("Remote API base URL is required when target is Remote API.", true);
                return;
            }

            runBtn.disabled = true;
            setStatus("Loading graph...");
            clearGraph();

            try {
                const path = version === "v2"
                    ? `/graph/v2?query=${encodeURIComponent(query)}`
                    : `/graph?query=${encodeURIComponent(query)}`;
                const endpoint = target === "remote" ? `${remoteBase}${path}` : path;

                const response = await fetch(endpoint, {
                    method: "GET",
                    headers: {
                        "X-Api-Key": apiKey
                    }
                });
                logTimingHeaders(response, query, version);

                const payload = await response.json();
                rawJsonEl.textContent = JSON.stringify(payload, null, 2);

                if (!response.ok) {
                    const detail = payload && payload.detail ? payload.detail : "Request failed.";
                    throw new Error(detail);
                }

                renderGraph(payload);
                const targetName = target === "remote" ? remoteBase : "local server";
                setStatus(
                    `Loaded ${payload.nodes.length} nodes and ${payload.edges.length} edges from ${version === "v2" ? "/graph/v2" : "/graph"} (${targetName}).`
                );
            } catch (error) {
                rawJsonEl.textContent = "{}";
                setStatus(error.message || "Failed to load graph.", true);
            } finally {
                runBtn.disabled = false;
            }
        }

        targetSelect.addEventListener("change", updateTargetUI);
        form.addEventListener("submit", loadGraph);
        updateTargetUI();
    </script>
</body>
</html>
